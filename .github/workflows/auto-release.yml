name: Auto Release to PyPI

on:
  push:
    branches:
      - main
    paths:
      - 'LOOBins/**'
      - 'src/**'
      - 'pyproject.toml'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run Tox
        run: uv run tox

  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Bump patch version
        id: version
        run: |
          CURRENT_VERSION=$(uv run python -c "import importlib.metadata; print(importlib.metadata.version('PyLOOBins'))" 2>/dev/null || grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" pyproject.toml
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Build project for distribution
        run: uv build

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            Automated release for version ${{ steps.version.outputs.version }}

            Published to PyPI: https://pypi.org/project/PyLOOBins/${{ steps.version.outputs.version }}/
          commit: ${{ github.sha }}
          makeLatest: true

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push version bump
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push https://${PAT_TOKEN}@github.com/infosecB/LOOBins.git main
